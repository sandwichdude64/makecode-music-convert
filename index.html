<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MIDI → MakeCode Arcade Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.27/build/Midi.js"></script>
  <script src="script.js" defer></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    h1 { margin-bottom: 10px; }
    #dropzone {
      width: 100%; height: 160px; border: 3px dashed #888;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #555; margin-bottom: 20px;
      border-radius: 10px; transition: border-color 0.2s, background-color 0.2s;
    }
    #dropzone.dragover {
      border-color: #0078d7;
      background-color: #eef6ff;
    }
    textarea {
      width: 100%; height: 220px; font-family: monospace;
      padding: 10px; box-sizing: border-box;
    }
    #status {
      margin-top: 10px; font-size: 14px; color: #555;
    }
  </style>
</head>
<body>

<h1>MIDI → MakeCode Arcade Converter</h1>
<p>Drag and drop a <strong>.mid</strong> file below. It will generate <code>music.playSong(hex`...`)</code> for MakeCode Arcade.</p>

<div id="dropzone">Drop your .mid file here</div>

<h3>MakeCode Output:</h3>
<textarea id="output" placeholder="Your MakeCode song code will appear here"></textarea>

<div id="status">Waiting for a MIDI file…</div>

</body>
</html>
